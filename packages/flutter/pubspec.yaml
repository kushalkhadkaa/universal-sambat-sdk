name: nepali_datepicker_studio
description: A comprehensive Nepali (Bikram Sambat) date picker package for Flutter with BS/AD conversion, multiple themes, and bilingual support.
version: 1.0.0
homepage: https://github.com/your-org/nepali-datepicker-studio

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

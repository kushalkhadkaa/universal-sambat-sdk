<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Mobile DatePicker Portal</title>
  <link rel="stylesheet" href="nepali-datepicker.css">
  <script src="nepali-datepicker.js"></script>
  <style>
    body {
      margin: 0;
      padding: 0;
      background: transparent;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }
    #picker-container {
      width: 100%;
      max-width: 360px;
      padding: 8px;
      box-sizing: border-box;
    }
    /* Mobile-optimized sizing overrides */
    .ndp-container.ndp-inline {
      width: 100% !important;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2) !important;
      border: 1px solid rgba(255,255,255,0.08) !important;
      background: #0f1524 !important;
    }
    html.light-theme .ndp-container.ndp-inline {
      background: #ffffff !important;
      border: 1px solid #e2e8f0 !important;
    }
  </style>
</head>
<body>
  <div id="picker-container"></div>
  
  <script>
    // Initialize WebController bindings for native postMessage events
    document.addEventListener('DOMContentLoaded', () => {
      // Parse query string parameters for runtime options config
      const urlParams = new URLSearchParams(window.location.search);
      const theme = urlParams.get('theme') || 'glassmorphism';
      const lang = urlParams.get('lang') || 'ne';
      const mode = urlParams.get('mode') || 'single';
      const forceLight = urlParams.get('light') === 'true';

      if (forceLight) {
        document.documentElement.classList.add('light-theme');
      }

      if (window.NepaliDatePicker) {
        new NepaliDatePicker('#picker-container', {
          inline: true,
          theme: theme,
          lang: lang,
          mode: mode,
          presets: mode === 'range',
          showDuration: mode === 'range',
          onChange: (date) => {
            // Send selected date details back to Native WebView container
            const dataStr = JSON.stringify({ event: 'change', data: date });
            if (window.ReactNativeWebView) {
              window.ReactNativeWebView.postMessage(dataStr);
            } else if (window.FlutterDatePicker) {
              window.FlutterDatePicker.postMessage(dataStr);
            } else {
              console.log("PostMessage data: ", dataStr);
            }
          },
          onRangeChange: (start, end) => {
            const dataStr = JSON.stringify({ event: 'rangeChange', data: { start, end } });
            if (window.ReactNativeWebView) {
              window.ReactNativeWebView.postMessage(dataStr);
            } else if (window.FlutterDatePicker) {
              window.FlutterDatePicker.postMessage(dataStr);
            } else {
              console.log("PostMessage range data: ", dataStr);
            }
          }
        });
      }
    });
  </script>
</body>
</html>
